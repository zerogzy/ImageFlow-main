<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'slide-in-right': 'slideInRight 0.3s ease-out',
                    },
                    keyframes: {
                        slideInRight: {
                            '0%': { transform: 'translateX(100%)' },
                            '100%': { transform: 'translateX(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .my-masonry-grid { display: flex; margin-left: -16px; }
        .my-masonry-grid_column { padding-left: 16px; background-clip: padding-box; }
        .my-masonry-grid_column > div { margin-bottom: 16px; }
        .page-bg { background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239C92AC' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M20 0v40M0 20h40'/%3E%3C/g%3E%3C/svg%3E"); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen page-bg">
    <header id="header" class="fixed top-0 left-0 right-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-800/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-sm">
                    <span class="text-white font-bold text-sm">IF</span>
                </div>
                <span class="font-semibold text-gray-900 dark:text-white text-sm">ImageFlow</span>
                <span id="role-badge" class="hidden px-2 py-0.5 text-xs font-medium rounded-md"></span>
            </div>
            <div class="flex items-center gap-2">
                <nav class="flex items-center gap-1">
                    <a href="/" class="px-3 py-1.5 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">广场</a>
                    <a id="nav-upload" href="/upload" class="hidden px-3 py-1.5 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">上传</a>
                    <a id="nav-manage" href="/manage" class="hidden px-3 py-1.5 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">管理</a>
                </nav>
                <button id="theme-toggle" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="切换主题">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>
                <button id="auth-btn" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="验证密钥">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 0115 7z"></path></svg>
                </button>
                <button id="logout-btn" class="hidden p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="退出登录">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 pt-6 pb-12">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-bold text-gray-900 dark:text-white">图片广场</h1>
            <div class="flex items-center gap-2">
                <select id="filter-format" class="px-3 py-1.5 text-sm font-medium rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                    <option value="webp">图片</option>
                    <option value="gif">GIF</option>
                </select>
                <select id="filter-orientation" class="px-3 py-1.5 text-sm font-medium rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                    <option value="all">全部方向</option>
                    <option value="landscape">横向</option>
                    <option value="portrait">纵向</option>
                </select>
                <select id="filter-tag" class="hidden px-3 py-1.5 text-sm font-medium rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                    <option value="">标签</option>
                </select>
            </div>
        </div>

        <div id="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        </div>
        
        <div id="empty" class="hidden text-center py-20">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 dark:bg-gray-800 mb-4">
                <svg class="h-8 w-8 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <p class="text-gray-500 dark:text-gray-400 text-lg">暂无图片</p>
        </div>

        <div id="gallery" class="hidden"></div>

        <div id="pagination" class="hidden flex justify-center items-center gap-2 mt-10"></div>
    </main>

    <div id="toast-container" class="fixed top-20 right-4 z-50 space-y-2"></div>

    <div id="auth-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 p-6 w-full max-w-sm mx-4">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">验证密钥</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">管理员密钥拥有完整权限，访客密钥仅可浏览图片。</p>
            <form id="auth-form">
                <input type="password" id="auth-key-input" placeholder="输入密钥" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 text-sm" autofocus>
                <p id="auth-error" class="mt-2 text-sm text-red-500 hidden"></p>
                <button type="submit" id="auth-submit" class="w-full mt-4 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium hover:from-indigo-600 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 shadow-lg shadow-indigo-500/25 text-sm">验证</button>
            </form>
        </div>
    </div>

    <div id="image-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="relative">
                <img id="modal-image" src="" alt="" class="w-full rounded-t-2xl">
                <button id="modal-close" class="absolute top-3 right-3 p-2 rounded-full bg-black/50 text-white hover:bg-black/70 transition-colors">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6">
                <h3 id="modal-filename" class="text-lg font-semibold text-gray-900 dark:text-white mb-2"></h3>
                <div id="modal-info" class="grid grid-cols-2 gap-3 text-sm mb-4"></div>
                <div id="modal-urls" class="space-y-2"></div>
                <div id="modal-actions" class="flex gap-3 mt-4 pt-4 border-t border-gray-200 dark:border-gray-700"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
