<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片上传 - ImageFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
    <header class="fixed top-0 left-0 right-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200/50 dark:border-gray-800/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center"><span class="text-white font-bold text-sm">IF</span></div><span class="font-semibold text-gray-900 dark:text-white text-sm">ImageFlow</span><span class="text-gray-300 dark:text-gray-600">/</span><span class="text-sm text-gray-500 dark:text-gray-400">图片上传</span></a>
            <div class="flex items-center gap-2">
                <a href="/" class="px-3 py-1.5 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">广场</a>
                <a href="/manage" class="px-3 py-1.5 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">管理</a>
                <button id="theme-toggle" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">🌓</button>
                <button id="auth-btn" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">🔑</button>
                <button id="logout-btn" class="hidden p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">🚪</button>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 pt-20 pb-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">图片上传</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">拖拽图片到下方区域或点击选择，支持批量上传</p>
        </div>

        <form id="upload-form" class="space-y-6">
            <div id="dropzone" class="relative flex flex-col items-center justify-center py-16 px-8 cursor-pointer border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-2xl bg-gray-50 dark:bg-gray-800/30 hover:border-indigo-300 dark:hover:border-indigo-600 transition-all duration-300">
                <div class="mb-5 p-4 rounded-2xl bg-indigo-50 dark:bg-indigo-900/30">
                    <svg class="h-8 w-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m0 0l-3-3"></path></svg>
                </div>
                <p class="text-base font-medium text-gray-700 dark:text-gray-300 mb-1.5">拖放图片到这里</p>
                <p class="text-sm text-gray-400 dark:text-gray-500 mb-4">或者点击选择文件（可多选）</p>
                <span class="text-xs text-gray-400 dark:text-gray-500">最多可选择 20 张图片</span>
                <input type="file" id="file-input" class="hidden" accept="image/*" multiple>
            </div>

            <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6 space-y-4">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium text-gray-500 dark:text-gray-400">过期时间</span>
                    <select id="expiry" class="px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm">
                        <option value="0">永不过期</option>
                        <option value="1">1分钟</option>
                        <option value="60">1小时</option>
                        <option value="1440">1天</option>
                        <option value="10080">7天</option>
                        <option value="43200">30天</option>
                    </select>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium text-gray-500 dark:text-gray-400">标签</span>
                    <input type="text" id="tags" placeholder="标签，逗号分隔" class="flex-1 px-3 py-2 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 text-sm">
                </div>
            </div>

            <div id="file-list" class="hidden bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 p-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-sm text-gray-600 dark:text-gray-400">已选择 <span id="file-count" class="font-semibold text-indigo-600 dark:text-indigo-400">0</span> 张图片</span>
                </div>
                <div id="file-items" class="space-y-2 mb-4 max-h-40 overflow-y-auto"></div>
                <button type="submit" id="upload-btn" class="w-full py-3 rounded-xl font-medium text-white bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 shadow-lg shadow-indigo-500/25 transition-all duration-300">上传图片</button>
                <div id="progress-bar" class="hidden mt-3 w-full h-2 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden">
                    <div id="progress-fill" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </form>
    </main>

    <div id="toast-container" class="fixed top-20 right-4 z-50 space-y-2"></div>

    <div id="auth-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 p-6 w-full max-w-sm mx-4">
            <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">验证管理员密钥</h2>
            <form id="auth-form">
                <input type="password" id="auth-key-input" placeholder="输入管理员密钥" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700/50 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 text-sm" autofocus>
                <p id="auth-error" class="mt-2 text-sm text-red-500 hidden"></p>
                <button type="submit" id="auth-submit" class="w-full mt-4 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium hover:from-indigo-600 hover:to-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 shadow-lg shadow-indigo-500/25 text-sm">验证</button>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        initTheme();
        checkAuth('admin', () => {
            document.getElementById('logout-btn').classList.remove('hidden');
        });

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const fileItems = document.getElementById('file-items');
        const fileCount = document.getElementById('file-count');
        let selectedFiles = [];

        dropzone.onclick = () => fileInput.click();
        dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('border-indigo-400', 'bg-indigo-50', 'dark:bg-indigo-900/20'); };
        dropzone.ondragleave = () => { dropzone.classList.remove('border-indigo-400', 'bg-indigo-50', 'dark:bg-indigo-900/20'); };
        dropzone.ondrop = (e) => { e.preventDefault(); dropzone.classList.remove('border-indigo-400', 'bg-indigo-50', 'dark:bg-indigo-900/20'); addFiles(e.dataTransfer.files); };
        fileInput.onchange = () => addFiles(fileInput.files);

        function addFiles(files) {
            for (const f of files) {
                if (f.type.startsWith('image/') && !selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) {
                    selectedFiles.push(f);
                }
            }
            if (selectedFiles.length > 20) selectedFiles = selectedFiles.slice(0, 20);
            renderFileList();
        }

        function renderFileList() {
            if (selectedFiles.length === 0) { fileList.classList.add('hidden'); return; }
            fileList.classList.remove('hidden');
            fileCount.textContent = selectedFiles.length;
            fileItems.innerHTML = selectedFiles.map((f, i) => `<div class="flex items-center justify-between text-sm text-gray-600 dark:text-gray-400"><span>${f.name}</span><span>${(f.size / 1024).toFixed(0)} KB</span><button onclick="removeFile(${i})" class="text-red-500 hover:text-red-600">✕</button></div>`).join('');
        }

        function removeFile(i) { selectedFiles.splice(i, 1); renderFileList(); }

        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            if (selectedFiles.length === 0) return;

            const btn = document.getElementById('upload-btn');
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            
            btn.disabled = true;
            btn.textContent = '上传中...';
            progressBar.classList.remove('hidden');
            progressFill.style.width = '0%';

            const expiry = document.getElementById('expiry').value;
            const tags = document.getElementById('tags').value;

            try {
                const result = await API.upload('/api/upload', selectedFiles, (p) => {
                    progressFill.style.width = p + '%';
                });

                const success = result.results.filter(r => r.status === 'success').length;
                const fail = result.results.filter(r => r.status === 'error').length;
                if (success > 0) showToast(`上传成功：${success}张图片`, 'success');
                if (fail > 0) showToast(`${fail}张图片上传失败`, 'error');
                
                selectedFiles = [];
                renderFileList();
                progressFill.style.width = '100%';
                setTimeout(() => progressBar.classList.add('hidden'), 1000);
            } catch (err) {
                showToast('上传失败：' + err.message, 'error');
                progressBar.classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = '上传图片';
            }
        };
    </script>
</body>
</html>
